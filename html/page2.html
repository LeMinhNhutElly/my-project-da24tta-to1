<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK From ĐN</title>
	<link rel="stylesheet" href="../css/styles1.css">
</head> 

<body>
    <div class="container">
        <from id = "frmLogin">
            <h3 id = "title">Đăng Nhập Hệ Thống </h3>
            <div class="from-group">
                <label for="txtUsername">Tên Đăng Nhập</label>
                <input class="form-control" type="text" id = "txtUsername" name = "txtUsername"></input>
            </div>
            <div class="from-group">
                <label for="txtPassword">Mật Khẩu</label>
                <input class="form-control" type="password" id = "txtUsername" name = "txtUsername"></input>
            </div>    
                <input class = "button" type="submit" id = "sbLogin" name = "sbLogin" value="Đăng Nhập">
                <input class = "button" type="reset" id = "rsCancel" name = "rsCancel" value="Nhập Lại">
        </from>
    </div> 
</body>
