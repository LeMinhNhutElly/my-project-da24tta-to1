<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng Cửu Chương</title>
    <style>
       
    </style>
</head>
<body>
    <form id = frminBCC>
        <h2>In Bảng Cửu Chương</h2>

        <label for = "number"> Nhập Số Từ 2-9 </label>
        <input type="number" min ="2" max="9">
        <input type = "button" value = "In" onclick = "inBCC()">
        
        <div id="kq"></div>
    </form>
    <script>
        function inBCC(){
            const myForm = document.forms["frminBCC"];
            const myNumber = myForm.elements[0];
            let num = parseInt(myNumber.value);
            let kq ="";
            for(let i = 1; i <= 10; i++){
                kq += num + "x" + i + "=" + (num*i) + "<br>";
            }
            document.getElementById("kq").innerHTML = kq;
        }
    </script>
</body>
</html>
